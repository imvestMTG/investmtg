<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>investMTG — Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect — preserves the route in the hash
    var path = window.location.pathname;
    var hash = window.location.hash;
    var search = window.location.search;
    // Redirect to index with the path as a hash route
    if (path && path !== '/' && path !== '/index.html') {
      window.location.replace('/' + search + hash);
    } else {
      window.location.replace('/' + search + hash);
    }
  </script>
</head>
<body>
  <p>Redirecting to <a href="/">investMTG</a>...</p>
</body>
</html>
