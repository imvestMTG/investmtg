<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Test Harness</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "react": "./vendor/react.mjs",
      "react-dom/client": "./vendor/react-dom-client.mjs"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { formatUSD } from './utils/helpers.js';
    import { TrashIcon, MapPinIcon, TruckIcon, ChevronRightIcon } from './components/shared/Icons.js';
    import { CART_MAX_QUANTITY } from './utils/config.js';
    import { groupBySeller } from './utils/group-by-seller.js';

    var h = React.createElement;

    /* ConditionChip — copied from CartView */
    function ConditionChip(_ref) {
      var abbr = _ref.abbr;
      var fullLabel = _ref.fullLabel;
      var price = _ref.price;
      var isSelected = _ref.isSelected;
      var onSelect = _ref.onSelect;
      var ref = React.useState(false);
      var hovered = ref[0], setHovered = ref[1];
      var ref2 = React.useState(false);
      var pressed = ref2[0], setPressed = ref2[1];
      var condColor = abbr === 'NM' ? '#22c55e' : abbr === 'LP' ? '#3b82f6' : abbr === 'MP' ? '#f59e0b' : abbr === 'HP' ? '#f97316' : abbr === 'DMG' ? '#ef4444' : '#888';
      var chipStyle = {};
      if (isSelected) {
        chipStyle.background = condColor; chipStyle.borderColor = condColor; chipStyle.color = '#fff';
        chipStyle.boxShadow = '0 0 0 2px ' + condColor + '40';
      } else if (hovered) {
        chipStyle.transform = 'translateY(-2px) scale(1.06)'; chipStyle.borderColor = condColor + '80';
        chipStyle.color = condColor; chipStyle.boxShadow = '0 4px 12px rgba(0,0,0,0.25)'; chipStyle.background = condColor + '15';
      }
      return h('button', {
        className: 'cart-cond-chip' + (isSelected ? ' cart-cond-chip--active' : ''),
        style: chipStyle, onClick: onSelect,
        onMouseEnter: function() { setHovered(true); },
        onMouseLeave: function() { setHovered(false); setPressed(false); },
        'aria-label': 'Select ' + fullLabel + ' at ' + formatUSD(price),
        title: fullLabel + ' — ' + formatUSD(price)
      },
        h('span', { className: 'cond-chip-abbr' }, abbr),
        h('span', { className: 'cond-chip-price' }, formatUSD(price))
      );
    }

    function WarningIcon() {
      return h('svg', { width: 16, height: 16, viewBox: '0 0 16 16', fill: 'none', 'aria-hidden': 'true', style: { flexShrink: 0 } },
        h('path', { d: 'M8 1.5L1 14h14L8 1.5z', stroke: 'currentColor', strokeWidth: 1.5, strokeLinejoin: 'round', fill: 'none' }),
        h('path', { d: 'M8 6v3.5', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round' }),
        h('circle', { cx: 8, cy: 12, r: 0.75, fill: 'currentColor' })
      );
    }

    /* Mock cart data */
    var mockCart = [
      {
        id: 'b740e7f0-underground-sea',
        name: 'Underground Sea',
        set: 'Revised Edition',
        setCode: '3ed',
        price: 523.46,
        image: 'https://cards.scryfall.io/small/front/b/7/b740e7f0-45b5-4e54-8757-85fb6477031b.jpg',
        qty: 1,
        seller: 'Unknown Seller'
      },
      {
        id: '0c2e0e40-black-lotus',
        name: 'Black Lotus',
        set: 'Unlimited Edition',
        setCode: '2ed',
        price: 28500.00,
        image: 'https://cards.scryfall.io/small/front/0/c/0c2e0e40-4735-4950-85d3-5765c4f53b20.jpg',
        qty: 1,
        seller: 'Island Cards GU'
      }
    ];

    /* Mock JustTCG condition prices — pre-loaded so no API call needed */
    var mockJtcgPrices = {
      'b740e7f0-underground-sea': {
        conditionPrices: { 'Damaged': 523.46, 'Heavily Played': 631.95, 'Moderately Played': 724.39, 'Lightly Played': 796.27, 'Near Mint': 918.31 }
      },
      '0c2e0e40-black-lotus': {
        conditionPrices: { 'Damaged': 111.46, 'Lightly Played': 217.52 }
      }
    };

    function TestCartView() {
      var ref1 = React.useState(mockCart);
      var cart = ref1[0], setCart = ref1[1];

      var jtcgPrices = mockJtcgPrices;
      var jtcgLoading = false;

      var subtotal = cart.reduce(function(sum, item) { return sum + (item.price || 0) * (item.qty || 1); }, 0);
      var sellerGroups = groupBySeller(cart);

      var itemsMissingCondition = cart.filter(function(item) {
        return !item.condition && jtcgPrices[item.id] && jtcgPrices[item.id].conditionPrices && Object.keys(jtcgPrices[item.id].conditionPrices).length > 0;
      });
      var allConditionsChosen = itemsMissingCondition.length === 0 && !jtcgLoading;

      function updateQty(id, qty) {
        if (qty < 1) { setCart(cart.filter(function(item) { return item.id !== id; })); }
        else if (qty <= CART_MAX_QUANTITY) { setCart(cart.map(function(item) { return item.id === id ? Object.assign({}, item, { qty: qty }) : item; })); }
      }
      function removeItem(id) { setCart(cart.filter(function(item) { return item.id !== id; })); }

      return h('div', { className: 'container cart-page' },
        h('div', { className: 'cart-page-header' },
          h('h1', { className: 'page-heading' }, 'Your Cart'),
          h('button', { className: 'btn btn-secondary btn-sm cart-clear-btn' }, 'Clear Cart')
        ),
        h('div', { className: 'cart-grid' },
          h('div', { className: 'cart-items' },
            Object.keys(sellerGroups).map(function(seller) {
              var items = sellerGroups[seller];
              return h('div', { key: seller, className: 'cart-seller-group' },
                h('div', { className: 'cart-seller-header' },
                  h('span', { className: 'cart-seller-label' }, 'From: ' + seller)
                ),
                items.map(function(item) {
                  var jtcg = jtcgPrices[item.id];
                  var hasConditions = jtcg && jtcg.conditionPrices && Object.keys(jtcg.conditionPrices).length > 0;
                  var needsCondition = hasConditions && !item.condition;

                  return h('div', { key: item.id, className: 'cart-item' + (needsCondition ? ' cart-item--needs-condition' : '') },
                    h('div', { className: 'cart-item-top' },
                      h('a', { className: 'cart-item-image', href: '#card/' + item.id },
                        item.image
                          ? h('img', { src: item.image, alt: item.name, loading: 'lazy' })
                          : h('div', { className: 'cart-item-img-placeholder' }, '\uD83C\uDCCF')
                      ),
                      h('div', { className: 'cart-item-details' },
                        h('a', { className: 'cart-item-name cart-item-link', href: '#card/' + item.id }, item.name),
                        h('div', { className: 'cart-item-meta' },
                          item.set && h('span', { className: 'cart-item-set' }, item.set),
                          item.condition && h('span', { className: 'cart-item-cond-badge cond-' + (item.condition || '').toLowerCase() }, item.condition)
                        ),
                        h('div', { className: 'cart-item-unit-price' }, formatUSD(item.price || 0), ' each')
                      ),
                      h('div', { className: 'cart-item-controls' },
                        h('button', { className: 'qty-btn', onClick: function() { updateQty(item.id, (item.qty || 1) - 1); } }, '\u2212'),
                        h('span', { className: 'qty-value' }, item.qty || 1),
                        h('button', { className: 'qty-btn', onClick: function() { updateQty(item.id, (item.qty || 1) + 1); } }, '+')
                      ),
                      h('div', { className: 'cart-item-price' }, formatUSD((item.price || 0) * (item.qty || 1))),
                      h('button', { className: 'cart-item-remove icon-btn' }, h(TrashIcon, null))
                    ),
                    hasConditions
                      ? h('div', { className: 'cart-condition-section' + (needsCondition ? ' cart-condition-section--alert' : '') },
                          h('div', { className: 'cart-condition-header' },
                            needsCondition
                              ? h('span', { className: 'cart-condition-prompt' }, h(WarningIcon, null), 'Select a condition to continue')
                              : h('span', { className: 'cart-condition-chosen' }, 'Condition: ', h('strong', null, item.condition))
                          ),
                          h('div', { className: 'cart-condition-chips' },
                            (function() {
                              var condOrder = ['Damaged', 'Heavily Played', 'Moderately Played', 'Lightly Played', 'Near Mint'];
                              var entries = Object.entries(jtcg.conditionPrices);
                              entries.sort(function(a, b) {
                                var ai = condOrder.indexOf(a[0]); if (ai < 0) ai = 99;
                                var bi = condOrder.indexOf(b[0]); if (bi < 0) bi = 99;
                                return ai - bi;
                              });
                              return entries;
                            })().slice(0, 5).map(function(entry) {
                              var condLabel = entry[0]; var condPrice = entry[1];
                              var abbr = condLabel === 'Near Mint' ? 'NM' : condLabel === 'Lightly Played' ? 'LP' : condLabel === 'Moderately Played' ? 'MP' : condLabel === 'Heavily Played' ? 'HP' : condLabel === 'Damaged' ? 'DMG' : condLabel;
                              var isSelected = (item.condition || '').toUpperCase() === abbr;
                              return h(ConditionChip, {
                                key: condLabel, abbr: abbr, fullLabel: condLabel, price: condPrice, isSelected: isSelected,
                                onSelect: function() {
                                  setCart(cart.map(function(ci) {
                                    if (ci.id !== item.id) return ci;
                                    return Object.assign({}, ci, { condition: abbr, price: condPrice });
                                  }));
                                }
                              });
                            })
                          )
                        )
                      : null
                  );
                })
              );
            })
          ),
          h('div', { className: 'order-summary' },
            h('h3', null, 'Order Summary'),
            h('div', { className: 'summary-row' }, h('span', null, cart.length + ' items'), h('span', null, formatUSD(subtotal))),
            h('div', { className: 'summary-row shipping-estimate' }, h('span', null, 'Shipping'), h('span', { style: { color: 'var(--color-text-muted)' } }, 'Calc at checkout')),
            h('div', { className: 'summary-row total' }, h('span', null, 'Subtotal'), h('span', null, formatUSD(subtotal))),
            h('div', { className: 'cart-jtcg-note' }, 'Condition prices from ', h('a', { href: 'https://justtcg.com', target: '_blank', rel: 'noopener noreferrer' }, 'JustTCG')),
            h('div', { className: 'cart-fulfillment-preview' },
              h('div', { className: 'cart-fulfillment-row' }, h(MapPinIcon, null), h('span', null, 'Local Pickup \u2014 Free')),
              h('div', { className: 'cart-fulfillment-row' }, h(TruckIcon, null), h('span', null, 'Ship to Guam \u2014 $5 flat'))
            ),
            itemsMissingCondition.length > 0
              ? h('div', { className: 'cart-checkout-blocked' },
                  h(WarningIcon, null),
                  h('span', null, 'Select conditions for ' + itemsMissingCondition.length + ' items before checkout')
                )
              : null,
            h('a', {
              href: allConditionsChosen ? '#checkout' : undefined,
              className: 'btn btn-primary btn-lg cart-checkout-btn' + (!allConditionsChosen ? ' cart-checkout-btn--disabled' : '')
            }, 'Proceed to Checkout ', h(ChevronRightIcon, null)),
            h('a', { href: '#store', className: 'btn btn-secondary cart-continue-btn' }, 'Continue Shopping'),
            h('div', { className: 'cart-local-pickup-note' }, h(MapPinIcon, null), h('span', null, 'All orders fulfilled through Guam local sellers.'))
          )
        )
      );
    }

    var root = createRoot(document.getElementById('root'));
    root.render(h(TestCartView));
  </script>
</body>
</html>
