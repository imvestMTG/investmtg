<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>investMTG Auth Diagnostic</title>
<style>
body { background: #0D0F12; color: #E8E6E1; font: 14px/1.6 monospace; padding: 24px; max-width: 900px; margin: 0 auto; }
h1 { color: #D4A843; font-size: 18px; }
.ok { color: #4ade80; }
.err { color: #f87171; }
.warn { color: #fbbf24; }
pre { background: #1a1c20; padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
button { background: #D4A843; color: #0D0F12; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 8px 4px; }
</style>
</head>
<body>
<h1>investMTG Auth Diagnostic</h1>
<div id="log"></div>
<script type="module">
var log = document.getElementById('log');
function add(cls, msg) {
  var p = document.createElement('pre');
  p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
}

add('', '=== Step 1: Check URL params ===');
var params = new URLSearchParams(window.location.search);
var urlToken = params.get('auth_token');
add(urlToken ? 'ok' : 'warn', 'auth_token in URL: ' + (urlToken ? urlToken.substring(0, 16) + '...' : 'NONE'));

add('', '=== Step 2: Check localStorage ===');
var stored = null;
try { stored = localStorage.getItem('investmtg_auth_token'); } catch(e) { add('err', 'localStorage error: ' + e); }
add(stored ? 'ok' : 'warn', 'Stored token: ' + (stored ? stored.substring(0, 16) + '...' : 'NONE'));

// If URL has token, store it
if (urlToken) {
  try {
    localStorage.setItem('investmtg_auth_token', urlToken);
    add('ok', 'Stored URL token to localStorage');
    stored = urlToken;
    // Clean URL
    window.history.replaceState(null, '', window.location.pathname);
  } catch(e) { add('err', 'Failed to store token: ' + e); }
}

add('', '=== Step 3: Test API endpoints ===');
var PROXY = 'https://api.investmtg.com';

// Health check
try {
  var r1 = await fetch(PROXY + '/api/health');
  var d1 = await r1.json();
  add('ok', 'Health: ' + JSON.stringify(d1));
} catch(e) {
  add('err', 'Health FAILED: ' + e.message);
}

// Test CORS with Origin
try {
  var r2 = await fetch(PROXY + '/api/health', { credentials: 'include' });
  var d2 = await r2.json();
  add('ok', 'Health (with credentials): ' + JSON.stringify(d2));
} catch(e) {
  add('err', 'Health (credentials) FAILED: ' + e.message);
}

// Auth/me without token
try {
  var r3 = await fetch(PROXY + '/auth/me', { credentials: 'include' });
  var d3 = await r3.json();
  add(d3.authenticated ? 'ok' : 'warn', 'Auth/me (no token): ' + JSON.stringify(d3));
} catch(e) {
  add('err', 'Auth/me (no token) FAILED: ' + e.message);
}

// Auth/me with stored token
if (stored) {
  try {
    var r4 = await fetch(PROXY + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + stored },
      credentials: 'include'
    });
    add('', 'Auth/me response status: ' + r4.status + ' ok=' + r4.ok);
    var d4 = await r4.json();
    add(d4.authenticated ? 'ok' : 'err', 'Auth/me (with token): ' + JSON.stringify(d4));
  } catch(e) {
    add('err', 'Auth/me (with token) FAILED: ' + e.message);
  }
} else {
  add('warn', 'No token available — skipping authenticated test');
}

// Test featured cards
try {
  var r5 = await fetch(PROXY + '/api/featured');
  var d5 = await r5.json();
  add('ok', 'Featured cards: got ' + (d5.data ? d5.data.length : 0) + ' cards');
} catch(e) {
  add('err', 'Featured cards FAILED: ' + e.message);
}

add('', '=== Step 4: Sign-in test ===');
add('', 'Click to test sign-in flow:');
var btn = document.createElement('button');
btn.textContent = 'Sign In with Google';
btn.onclick = function() { window.location.href = PROXY + '/auth/google'; };
log.appendChild(btn);

add('', '');
add('', 'After sign-in, revisit this page — if the token was captured, it will show above.');
</script>
</body>
</html>
