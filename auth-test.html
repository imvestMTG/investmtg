<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>investMTG Auth Diagnostic</title>
<style>
body { background: #0D0F12; color: #E8E6E1; font: 14px/1.6 monospace; padding: 24px; max-width: 900px; margin: 0 auto; }
h1 { color: #D4A843; font-size: 18px; }
.ok { color: #4ade80; }
.err { color: #f87171; }
.warn { color: #fbbf24; }
pre { background: #1a1c20; padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
button { background: #D4A843; color: #0D0F12; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 8px 4px; font-size: 16px; }
</style>
</head>
<body>
<h1>investMTG Auth Diagnostic</h1>
<div id="log"></div>
<script>
var log = document.getElementById('log');
function add(cls, msg) {
  var p = document.createElement('pre');
  p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
}

// Step 1: URL params
add('', '=== Step 1: Check URL params ===');
add('', 'Full URL: ' + window.location.href);
var params = new URLSearchParams(window.location.search);
var urlToken = params.get('auth_token');
add(urlToken ? 'ok' : 'warn', 'auth_token in URL: ' + (urlToken ? urlToken.substring(0, 20) + '...' : 'NONE'));

// Step 2: localStorage
add('', '=== Step 2: Check localStorage ===');
var stored = null;
try { stored = localStorage.getItem('investmtg_auth_token'); } catch(e) { add('err', 'localStorage error: ' + e); }
add(stored ? 'ok' : 'warn', 'Existing stored token: ' + (stored ? stored.substring(0, 20) + '...' : 'NONE'));

// If URL has token, store it
if (urlToken) {
  try {
    localStorage.setItem('investmtg_auth_token', urlToken);
    add('ok', 'Stored URL token to localStorage successfully');
    stored = urlToken;
    window.history.replaceState(null, '', window.location.pathname);
  } catch(e) { add('err', 'Failed to store token: ' + e); }
}

var PROXY = 'https://api.investmtg.com';

// Step 3: Test auth/me with token
add('', '=== Step 3: Test /auth/me ===');
var token = stored;
if (token) {
  add('', 'Testing with token: ' + token.substring(0, 20) + '...');
  fetch(PROXY + '/auth/me', {
    headers: { 'Authorization': 'Bearer ' + token },
    credentials: 'include'
  }).then(function(res) {
    add('', 'Response status: ' + res.status);
    return res.json();
  }).then(function(data) {
    add(data.authenticated ? 'ok' : 'err', 'Result: ' + JSON.stringify(data, null, 2));
    if (data.authenticated) {
      add('ok', '✓ AUTH WORKS! User: ' + data.user.name + ' (' + data.user.email + ')');
      add('ok', 'The token exchange and /auth/me are both working.');
      add('warn', 'If the main site still shows "Sign In", the issue is in the main app code.');
    }
  }).catch(function(e) {
    add('err', 'Fetch error: ' + e.message);
  });
} else {
  add('warn', 'No token available. Click Sign In below to test the full flow.');
}

// Step 4: Sign-in button
add('', '=== Step 4: Test sign-in ===');
add('', 'Click below to sign in. After Google auth, you will be redirected BACK to this diagnostic page.');

var btn = document.createElement('button');
btn.textContent = 'Sign In with Google (test)';
btn.onclick = function() { window.location.href = PROXY + '/auth/google'; };
log.appendChild(btn);

add('', '');
add('warn', 'NOTE: The worker currently redirects to www.investmtg.com after auth.');
add('warn', 'After sign-in, copy the auth_token from the URL and visit:');
add('', window.location.origin + '/auth-test.html?auth_token=PASTE_TOKEN_HERE');
</script>
</body>
</html>
