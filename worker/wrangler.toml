name = "investmtg-proxy"
main = "worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# API keys are stored as encrypted secrets (wrangler secret put)
# JUSTTCG_API_KEY — set via: wrangler secret put JUSTTCG_API_KEY
# TOPDECK_API_KEY — set via: wrangler secret put TOPDECK_API_KEY
